services:
  postgres:
    image: postgres:17.1-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./observability/postgres-init:/docker-entrypoint-initdb.d:ro

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # prometheus metrics
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro

  promtail:
    image: grafana/promtail:2.9.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./logs:/logs
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo.yaml:ro

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.0.0
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/http-metrics.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    ports:
      - "3000:3000"
      - "9464:9464"
      - "50051:50051"
    environment:
      - PORT=3000
      - GRPC_PORT=50051
      - HOST=0.0.0.0
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=inventory
      - LOG_FILE=/logs/inventory-service.log
      - ORDER_SERVICE_BASE_URL=http://order-fulfillment-service:3002
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - RABBITMQ_EXCHANGE=course.events.v1
      - RABBITMQ_DLX=course.dlx.v1
      - RABBITMQ_MAX_RETRIES=3
      - METRICS_PORT=9464
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    volumes:
      - ./logs:/logs
    depends_on:
      - postgres
      - rabbitmq
      - tempo

  order-fulfillment-service:
    build:
      context: .
      dockerfile: order-fulfillment-service/Dockerfile
    ports:
      - "3002:3002"
      - "9465:9465"
      - "50052:50052"
    environment:
      - PORT=3002
      - GRPC_PORT=50052
      - HOST=0.0.0.0
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=fulfillment
      - LOG_FILE=/logs/order-fulfillment-service.log
      - INVENTORY_BASE_URL=http://inventory-service:3000
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - RABBITMQ_EXCHANGE=course.events.v1
      - RABBITMQ_DLX=course.dlx.v1
      - RABBITMQ_MAX_RETRIES=3
      - METRICS_PORT=9465
      - OTEL_SERVICE_NAME=order-fulfillment-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    volumes:
      - ./logs:/logs
    depends_on:
      - postgres
      - rabbitmq
      - tempo

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
      - "9466:9466"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - INVENTORY_BASE_URL=http://inventory-service:3000
      - FULFILLMENT_BASE_URL=http://order-fulfillment-service:3002
      # Para el Día 10 (tracing HTTP) es más fácil empezar con HTTP.
      # Cambia a `grpc` para usar los adaptadores gRPC del Gateway.
      - DOWNSTREAM_TRANSPORT=http
      - INVENTORY_GRPC_ADDRESS=inventory-service:50051
      - FULFILLMENT_GRPC_ADDRESS=order-fulfillment-service:50052
      - METRICS_PORT=9466
      - OTEL_SERVICE_NAME=api-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
    depends_on:
      - inventory-service
      - order-fulfillment-service
      - tempo

  demo-traffic:
    image: curlimages/curl:8.6.0
    profiles: ["demo"]
    depends_on:
      - api-gateway
    command:
      [
        "sh",
        "-lc",
        "set -eu; \
         echo 'Waiting for api-gateway...'; \
         i=0; \
         while [ $$i -lt 180 ]; do \
           if curl -fsS http://api-gateway:8080/health >/dev/null; then break; fi; \
           sleep 1; \
           i=$$((i+1)); \
         done; \
         if ! curl -fsS http://api-gateway:8080/health >/dev/null; then \
           echo 'api-gateway health did not become OK in time'; \
           exit 1; \
         fi; \
         echo 'Generating demo traffic (CTRL+C to stop)...'; \
         n=0; \
         while true; do \
           n=$$((n+1)); \
           case $$((n%3)) in \
             1) sku='11111111-1111-1111-1111-111111111111' ;; \
             2) sku='22222222-2222-2222-2222-222222222222' ;; \
             0) sku='33333333-3333-3333-3333-333333333333' ;; \
           esac; \
           orderNum=$$(( (n % 999999) + 1 )); \
           lineNum=$$(( (n % 9999) + 1 )); \
           orderId=$$(printf 'ORDER-%06d' $$orderNum); \
           reservationId=RES-$$orderId; \
           lineId=$$(printf 'LINE-%04d' $$lineNum); \
           curl -sS -X POST http://api-gateway:8080/orders -H 'content-type: application/json' \
             -d \"{\\\"orderId\\\":\\\"$$orderId\\\",\\\"reservationId\\\":\\\"$$reservationId\\\",\\\"lines\\\":[{\\\"lineId\\\":\\\"$$lineId\\\",\\\"sku\\\":\\\"$$sku\\\",\\\"qty\\\":1}]}\" >/dev/null || true; \
           curl -sS http://api-gateway:8080/orders/$$orderId/status >/dev/null || true; \
           curl -sS http://api-gateway:8080/inventory/$$sku >/dev/null || true; \
           if [ $$((n%5)) -eq 0 ]; then \
             curl -sS -X POST http://api-gateway:8080/orders/$$orderId/cancel >/dev/null || true; \
           fi; \
           if [ $$((n%7)) -eq 0 ]; then \
             badOrderNum=$$(( ((n + 12345) % 999999) + 1 )); \
             badLineNum=$$(( (badOrderNum % 9999) + 1 )); \
             badOrderId=$$(printf 'ORDER-%06d' $$badOrderNum); \
             badReservationId=RES-$$badOrderId; \
             badLineId=$$(printf 'LINE-%04d' $$badLineNum); \
             curl -sS -X POST http://api-gateway:8080/orders -H 'content-type: application/json' \
               -d \"{\\\"orderId\\\":\\\"$$badOrderId\\\",\\\"reservationId\\\":\\\"$$badReservationId\\\",\\\"lines\\\":[{\\\"lineId\\\":\\\"$$badLineId\\\",\\\"sku\\\":\\\"$$sku\\\",\\\"qty\\\":9999}]}\" >/dev/null || true; \
           fi; \
           sleep 2; \
         done"
      ]

volumes:
  postgres_data:
  grafana_data:
